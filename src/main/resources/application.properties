spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Mittente verificato su Brevo (deve corrispondere al tuo account)
mail.from=noreply@andreafumero.it

# Destinatario finale: email del dottore
mail.to=andrea.fumero@humanitas.it

# ??? LOGGING ??????????????????????????????????????????????
logging.level.com.fumero=INFO
logging.level.org.springframework.mail=DEBUG