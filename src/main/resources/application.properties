cors.allowed-origins=http://localhost:5173,https://www.andreafumero.it

# ??? MAIL (Brevo SMTP) ????????????????????????????????????
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=TUA_EMAIL_BREVO
